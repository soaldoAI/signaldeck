name: signaldeck

# One-command deployment. `./scripts/start.sh` (or `docker compose up -d`
# once .env exists) brings up the database, mail server, web app, and
# background worker. Open http://localhost:3000 and follow the wizard.

x-app-env: &app-env
  DATABASE_URL: postgresql://signaldeck:${POSTGRES_PASSWORD:-signaldeck}@postgres:5432/signaldeck
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env (scripts/start.sh generates one)}
  APP_URL: ${APP_URL:-http://localhost:3000}
  # Bundled Mailpit is reachable as `mailpit` inside the compose network.
  SMTP_HOST: ${SMTP_HOST:-mailpit}
  SMTP_PORT: "1025"
  SMTP_FROM: ${SMTP_FROM:-SignalDeck <briefing@localhost>}
  # Ollama runs on the HOST, not in this network. From inside a container,
  # the host is `host.docker.internal` (mapped via extra_hosts below) — not
  # localhost, which would resolve to the container itself.
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  # Google OAuth (Gmail/Calendar connectors). The user's own OAuth client —
  # see docs/google-oauth-setup.md. Supplied via .env; never committed.
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  # Telegram connector (the worker needs these to sync a saved session).
  # See docs/telegram-setup.md.
  TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
  TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}

# Map host.docker.internal → the host gateway. Docker Desktop (macOS/Windows)
# provides this automatically; the entry makes it work on Linux too.
x-host-gateway: &host-gateway
  - "host.docker.internal:host-gateway"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: signaldeck
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signaldeck}
      POSTGRES_DB: signaldeck
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signaldeck"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local SMTP server. Catches all outbound mail (e.g. daily briefings)
  # and exposes a web UI at http://localhost:8025.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  # One-shot: applies pending database migrations, then exits. The app and
  # worker wait for it to finish so they never race an unmigrated schema.
  migrate:
    build:
      context: .
      target: worker
    command: ["npm", "run", "db:deploy"]
    restart: "no"
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    environment: *app-env
    extra_hosts: *host-gateway
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment: *app-env
    extra_hosts: *host-gateway
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
